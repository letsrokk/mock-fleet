quarkus:
  quinoa:
    ui-dir: ${QUINOA_UI_DIR:${user.dir}/src/main/webui}
    ui-root-path: /__fleet
    build-dir: dist
    enable-spa-routing: true
    ignored-path-prefixes: /__fleet/api
  smallrye-health:
    root-path: /__fleet/health
  container-image:
    builder: docker
    registry: ghcr.io
    group: letsrokk
    name: mock-fleet
    additional-tags:
      - latest
    build: true

mock-fleet:
  namespace: ${MOCK_FLEET_NAMESPACE:mock-fleet}
  inactivity-threshold: ${MOCK_FLEET_INACTIVITY_THRESHOLD:1M}
  pod-creation-timeout: ${MOCK_FLEET_POD_CREATION_TIMEOUT:1M}
  wiremock-image: wiremock/wiremock:3.9.2
  storage:
    pvc-name: ${MOCK_FLEET_STORAGE_PVC_NAME:mock-fleet-wiremock-mappings}
    container-mappings-path: ${MOCK_FLEET_STORAGE_CONTAINER_MAPPINGS_PATH:/home/wiremock/mappings}
    init-container-storage-path: ${MOCK_FLEET_STORAGE_INIT_CONTAINER_STORAGE_PATH:/storage}
  routing:
    mode: ${MOCK_FLEET_ROUTING_MODE:HOST}
    host: ${MOCK_FLEET_ROUTING_HOST:mock-fleet.localhost}

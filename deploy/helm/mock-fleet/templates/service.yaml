apiVersion: v1
kind: Service
metadata:
  name: {{ include "mock-fleet.fullname" . }}
  namespace: {{ include "mock-fleet.namespace" . }}
  labels:
    {{- include "mock-fleet.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mock-fleet.selectorLabels" . | nindent 4 }}
  ports:
    - name: debug
      port: {{ .Values.service.ports.debug }}
      protocol: TCP
      targetPort: {{ .Values.service.ports.targetDebug }}
    - name: http
      port: {{ .Values.service.ports.http }}
      protocol: TCP
      targetPort: {{ .Values.service.ports.targetHttp }}

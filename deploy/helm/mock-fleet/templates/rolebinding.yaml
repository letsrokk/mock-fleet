{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mock-fleet.roleBindingName" . }}
  namespace: {{ include "mock-fleet.namespace" . }}
  labels:
    {{- include "mock-fleet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mock-fleet.roleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mock-fleet.serviceAccountName" . }}
    namespace: {{ include "mock-fleet.namespace" . }}
{{- end }}

{{- if and .Values.storage.enabled .Values.storage.createPersistentVolume }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "mock-fleet.wiremockMappingsPvName" . }}
  labels:
    {{- include "mock-fleet.labels" . | nindent 4 }}
spec:
  capacity:
    storage: {{ .Values.storage.size | quote }}
  accessModes:
    {{- toYaml .Values.storage.accessModes | nindent 4 }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.storage.storageClassName | quote }}
  hostPath:
    path: {{ .Values.storage.hostPath | quote }}
    type: DirectoryOrCreate
{{- end }}

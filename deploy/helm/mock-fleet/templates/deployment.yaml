apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mock-fleet.fullname" . }}
  namespace: {{ include "mock-fleet.namespace" . }}
  labels:
    {{- include "mock-fleet.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mock-fleet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/hazelcast-client-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "mock-fleet.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mock-fleet.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
      containers:
        - name: {{ include "mock-fleet.name" . }}
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MOCK_FLEET_NAMESPACE
              value: {{ .Values.env.mockFleetNamespace | quote }}
            - name: MOCK_FLEET_ROUTING_MODE
              value: {{ .Values.routing.mode | quote }}
            - name: MOCK_FLEET_INACTIVITY_THRESHOLD
              value: {{ .Values.env.mockFleetInactivityThreshold | quote }}
            - name: MOCK_FLEET_POD_CREATION_TIMEOUT
              value: {{ .Values.env.mockFleetPodCreationTimeout | quote }}
            - name: QUINOA_UI_DIR
              value: {{ .Values.env.quinoaUiDir | quote }}
            - name: QUARKUS_PACKAGE_OUTPUT_DIRECTORY
              value: {{ .Values.env.quarkusPackageOutputDirectory | quote }}
            - name: QUARKUS_LAUNCH_DEVMODE
              value: {{ .Values.env.quarkusLaunchDevmode | quote }}
            - name: JAVA_OPTS
              value: {{ .Values.env.javaOpts | quote }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.env.javaToolOptions | quote }}
            - name: user.dir
              value: {{ .Values.env.userDir | quote }}
          ports:
            - name: debug
              containerPort: {{ .Values.service.ports.targetDebug }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.service.ports.targetHttp }}
              protocol: TCP
          livenessProbe:
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.ports.targetHttp }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.ports.targetHttp }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          startupProbe:
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: {{ .Values.service.ports.targetHttp }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            successThreshold: {{ .Values.probes.startup.successThreshold }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/hazelcast
              name: hazelcast-config
              readOnly: true
      volumes:
        - name: hazelcast-config
          configMap:
            name: {{ include "mock-fleet.hazelcastConfigMapName" . }}
            optional: false
